# ===================================
# CONFIGURACIÓN RAILWAY (PostgreSQL)
# Railway inyecta estas variables automáticamente
# cuando agregás el plugin de PostgreSQL
# ===================================
spring.datasource.url=jdbc:postgresql://${PGHOST}:${PGPORT}/${PGDATABASE}
spring.datasource.username=${PGUSER}
spring.datasource.password=${PGPASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===================================
# CONFIGURACIÓN DE JPA/HIBERNATE
# ===================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.packagesToScan=com.eventsphere.model

# ===================================
# CONFIGURACIÓN DEL SERVIDOR
# ===================================
server.port=${PORT:8080}
server.address=0.0.0.0
server.servlet.context-path=/eventsphere

# Carpeta de uploads; en Railway conviene apuntarla a un volumen persistente
upload.path=${UPLOAD_PATH:/app/uploads/eventos}

# ===================================
# CONFIGURACIÓN DE THYMELEAF
# ===================================
spring.thymeleaf.cache=true
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.check-template-location=false

# ===================================
# SPRING SECURITY (deshabilitado temporalmente)
# ===================================
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration

# ===================================
# LOGGING
# ===================================
logging.level.root=INFO
logging.level.com.eventsphere=INFO
