services:
  db:
    image: postgres:16-alpine
    container_name: eventsphere-db
    environment:
      POSTGRES_DB: eventsphere
      POSTGRES_USER: eventsphere
      POSTGRES_PASSWORD: eventpass123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eventsphere"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: eventsphere-app
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: local
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/eventsphere
      SPRING_DATASOURCE_USERNAME: eventsphere
      SPRING_DATASOURCE_PASSWORD: eventpass123
      UPLOAD_PATH: /app/uploads/eventos
    ports:
      - "8080:8080"
    volumes:
      - uploads:/app/uploads/eventos

volumes:
  postgres_data:
  uploads:
